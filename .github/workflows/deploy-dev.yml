name: deploytrack-api-deploy-dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/DevOpsBoard.Api/**"
      - "deploytrack-api/Dockerfile"
      - ".github/workflows/deploy-dev.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: deploytrack/deploytrack-api
  ECS_CLUSTER: deploytrack-dev-cluster
  ECS_SERVICE: deploytrack-dev-deploytrack-api
  ECS_TASK_DEFINITION: deploytrack-dev-deploytrack-api
  CONTAINER_NAME: deploytrack-api
  DEPLOYTRACK_HEALTH_URL: ${{ vars.DEPLOYTRACK_HEALTH_URL }}

jobs:
  deploy:
    name: test-build-push-deploy
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DevOpsBoard.sln

      - name: Build
        run: dotnet build DevOpsBoard.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DevOpsBoard.sln --configuration Release --no-build --verbosity normal

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f deploytrack-api/Dockerfile -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition > task-definition.json

      - name: Prepare ECS task definition
        run: |
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' task-definition.json > task-definition-clean.json

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-clean.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Validate health check
        run: |
          test -n "$DEPLOYTRACK_HEALTH_URL"
          curl --fail --retry 10 --retry-delay 10 --retry-all-errors "$DEPLOYTRACK_HEALTH_URL"
