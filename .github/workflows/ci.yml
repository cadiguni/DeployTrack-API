name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DevOpsBoard.sln

      - name: Build
        run: dotnet build DevOpsBoard.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DevOpsBoard.sln --configuration Release --no-build --verbosity normal
